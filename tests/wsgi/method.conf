# Per-test Apache configuration for tests/wsgi/method.
#
# The /method endpoint uses the server-wide default (Auto), which
# in this filter-free test setup leaves HEAD as HEAD. Two
# <Location> overrides below exercise the explicit On and Off
# settings of the WSGIMapHEADToGET directive.

<Location /test/wsgi/method/head-to-get>
    WSGIMapHEADToGET On
</Location>

<Location /test/wsgi/method/head-passthrough>
    WSGIMapHEADToGET Off
</Location>
