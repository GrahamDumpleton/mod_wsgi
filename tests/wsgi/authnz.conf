# Per-test Apache configuration for tests/wsgi/authnz.
#
# Each <Location> block exercises one mod_wsgi auth/access
# directive against a dedicated sub-path of the test mount point
# so the server-wide config does not need to be reconfigured
# between assertions.
#
# mod_wsgi-express only loads mod_auth_basic, mod_auth_digest and
# mod_authz_user when --auth-user-script is passed to setup-server;
# load them here so this test is self-contained.

<IfModule !auth_basic_module>
    LoadModule auth_basic_module ${MOD_WSGI_MODULES_DIRECTORY}/mod_auth_basic.so
</IfModule>
<IfModule !auth_digest_module>
    LoadModule auth_digest_module ${MOD_WSGI_MODULES_DIRECTORY}/mod_auth_digest.so
</IfModule>
<IfModule !authz_user_module>
    LoadModule authz_user_module ${MOD_WSGI_MODULES_DIRECTORY}/mod_authz_user.so
</IfModule>

<Location /test/wsgi/authnz/basic>
    AuthType Basic
    AuthName "Basic Area"
    AuthBasicProvider wsgi
    WSGIAuthUserScript ${TESTS_DIR}/wsgi/authnz.wsgi
    Require valid-user
</Location>

<Location /test/wsgi/authnz/digest>
    AuthType Digest
    AuthName "Digest Area"
    AuthDigestProvider wsgi
    WSGIAuthUserScript ${TESTS_DIR}/wsgi/authnz.wsgi
    Require valid-user
</Location>

<Location /test/wsgi/authnz/group>
    AuthType Basic
    AuthName "Group Area"
    AuthBasicProvider wsgi
    WSGIAuthUserScript ${TESTS_DIR}/wsgi/authnz.wsgi
    WSGIAuthGroupScript ${TESTS_DIR}/wsgi/authnz.wsgi
    Require wsgi-group secret-agents
</Location>

<Location /test/wsgi/authnz/allow>
    WSGIAccessScript ${TESTS_DIR}/wsgi/authnz.wsgi
</Location>

<Location /test/wsgi/authnz/deny>
    WSGIAccessScript ${TESTS_DIR}/wsgi/authnz.wsgi
</Location>
