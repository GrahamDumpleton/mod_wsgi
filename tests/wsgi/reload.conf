# Per-test Apache configuration for tests/wsgi/reload.
#
# Additional WSGIScriptAlias mounts for the reload test's fixtures.
# Each fixture is a standalone application() that captures a
# module-level LOAD_ID so the test can observe whether the module
# was reloaded across requests. Several fixtures also define a
# reload_required() callback at module scope to exercise the
# callback branch of wsgi_reload_required.
#
# WSGIScriptReloading defaults to On, so no override is needed;
# only wsgi_execute.c passes the resource argument that makes
# wsgi_reload_required consult the reload_required callback, so
# these mounts route through the embedded request path (which in
# the harness is the daemon-worker-side execute path).

# These longer-prefix aliases must be registered before the
# harness-emitted primary /test/wsgi/reload alias: WSGIScriptAlias
# matching is first-match-wins, and a request to
# /test/wsgi/reload/<name> would otherwise match /test/wsgi/reload
# first and get served by reload.py. The harness appends this file
# ahead of the primary alias so the ordering works out.

WSGIScriptAlias /test/wsgi/reload/static         ${TESTS_DIR}/wsgi/reload-fixtures/static.py            process-group=localhost:9876 application-group=%{GLOBAL}
WSGIScriptAlias /test/wsgi/reload/triggered      ${TESTS_DIR}/wsgi/reload-fixtures/triggered_reload.py  process-group=localhost:9876 application-group=%{GLOBAL}
WSGIScriptAlias /test/wsgi/reload/never-reload   ${TESTS_DIR}/wsgi/reload-fixtures/never_reload.py      process-group=localhost:9876 application-group=%{GLOBAL}
WSGIScriptAlias /test/wsgi/reload/raising        ${TESTS_DIR}/wsgi/reload-fixtures/raising_reload.py    process-group=localhost:9876 application-group=%{GLOBAL}
WSGIScriptAlias /test/wsgi/reload/missing-mtime  ${TESTS_DIR}/wsgi/reload-fixtures/missing_mtime.py     process-group=localhost:9876 application-group=%{GLOBAL}
