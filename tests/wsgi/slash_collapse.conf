# Per-test Apache configuration for tests/wsgi/slash_collapse.
#
# Note: MergeSlashes Off (required to let duplicate slashes reach
# mod_wsgi) is a server-scope directive and is set globally by the
# test harness in scripts/run-tests.sh.
#
# Additional WSGIScriptAlias mounted at a duplicate-slash path so
# the test can verify that mod_wsgi also collapses duplicates in
# SCRIPT_NAME (not just PATH_INFO). The target script is the same
# echo app used at the main mount.
WSGIScriptAlias //slashy-alias ${TESTS_DIR}/wsgi/slash_collapse.py process-group=localhost:9876 application-group=%{GLOBAL}
