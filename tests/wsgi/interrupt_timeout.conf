# Per-test Apache configuration for tests/wsgi/interrupt_timeout.
#
# Defines a dedicated daemon process group with short request-timeout
# and interrupt-timeout values so the test can drive the per-thread
# RequestTimeout injection path within a few seconds. threads=2 so a
# wedged request on one thread does not block the test's "process
# kept running" assertions on the other.
#
# Routing is via tests/dispatch.py: requests under
# /test/wsgi/interrupt-timeout are dispatched to this named daemon
# group. The harness's primary WSGIScriptAlias still mounts the
# script; the dispatch script overrides the static process-group on
# that alias.

WSGIDaemonProcess interrupt-timeout-test \
    threads=2 \
    request-timeout=2 \
    interrupt-timeout=5 \
    graceful-timeout=15 \
    shutdown-timeout=5
