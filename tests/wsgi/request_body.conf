# Per-test Apache configuration for tests/wsgi/request_body.
#
# Declares a dedicated daemon process group whose queue-timeout is 0
# and mounts the test script under /no-handshake with
# WSGIScriptReloading Off. The deferred-content "200 Continue"
# handshake is active whenever script reloading is on OR the serving
# daemon group's queue-timeout is non-zero, so turning both off
# disables it: the Apache child then streams the environment frame and
# the request body to the daemon in a single burst. This exercises the
# daemon-side frame read path (wsgi_read_strings) that must not
# over-read into the proxied body.
#
# Routing to the named group is done in tests/dispatch.py for requests
# under /test/wsgi/request-body/no-handshake; the static process-group
# on the alias below is overridden by that dispatch script. The
# longer-prefix alias is registered before the harness-emitted primary
# /test/wsgi/request-body alias because WSGIScriptAlias matching is
# first-match-wins.

WSGIDaemonProcess request-body-no-handshake \
    processes=1 \
    threads=2 \
    queue-timeout=0

WSGIScriptAlias /test/wsgi/request-body/no-handshake ${TESTS_DIR}/wsgi/request_body.py process-group=request-body-no-handshake application-group=%{GLOBAL}

<Location /test/wsgi/request-body/no-handshake>
    WSGIScriptReloading Off
</Location>
