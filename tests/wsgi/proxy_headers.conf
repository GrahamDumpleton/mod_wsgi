# Per-test Apache configuration for tests/wsgi/proxy_headers.
#
# Each <Location> block selects a different combination of
# WSGITrustedProxyHeaders / WSGITrustedProxies so the test .sh
# can exercise individual code paths of wsgi_process_proxy_headers
# without reconfiguring the server between assertions.

# Basic: trust a broad set of proxy headers with NO explicit
# trusted-proxies list. Every request is considered to originate
# from a trusted proxy, so the headers are applied directly and
# wsgi_process_forwarded_for uses the "no trusted proxies"
# branch (REMOTE_ADDR = first IP in X-Forwarded-For as-is).
<Location /test/wsgi/proxy-headers/basic>
    WSGITrustedProxyHeaders X-Forwarded-For X-Forwarded-Host X-Forwarded-Proto X-Forwarded-SSL X-Forwarded-HTTPS X-Script-Name X-Forwarded-Script-Name
</Location>

# Trusted client: trust the same headers AND declare 127.0.0.1
# (the test client's address) as a trusted proxy. This activates
# wsgi_process_forwarded_for's trusted-proxy walk over the
# X-Forwarded-For chain.
<Location /test/wsgi/proxy-headers/trusted-client>
    WSGITrustedProxyHeaders X-Forwarded-For X-Forwarded-Host X-Forwarded-Proto X-Forwarded-SSL X-Script-Name X-Forwarded-Script-Name
    WSGITrustedProxies 127.0.0.1 ::1
</Location>

# Untrusted client: declare a trusted-proxies allowlist that does
# NOT include the loopback address the test client uses, so the
# module treats the peer as untrusted and falls through to the
# header-stripping "else" branch in wsgi_process_proxy_headers.
<Location /test/wsgi/proxy-headers/untrusted-client>
    WSGITrustedProxyHeaders X-Forwarded-For X-Forwarded-Host X-Forwarded-Proto X-Forwarded-SSL X-Script-Name X-Forwarded-Script-Name
    WSGITrustedProxies 10.99.99.99
</Location>

# Partial: trust ONLY X-Forwarded-For. Other proxy-style headers
# must reach the application unchanged as ordinary HTTP_* environ
# entries, because their categories were never opted-in to
# trimming.
<Location /test/wsgi/proxy-headers/partial>
    WSGITrustedProxyHeaders X-Forwarded-For
</Location>
